<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع خالد للسكربتات ⚡</title>
    <style>
        body { background: #000; color: #00ffff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #00ffff; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 0 15px #00ffff; }
        textarea { width: 300px; height: 150px; background: #000; color: #00ffff; border: 1px solid #00ffff; margin: 10px 0; }
        button { background: #00ffff; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>سكربت خالد الخاص 🚀</h1>
        <p>انسخ السكربت من هنا مباشرة:</p>
        <textarea id="myScript" readonly>
-- هنا تحط كود الـ Lua الخاص بك
loadstring(game:HttpGet("https://raw.githubusercontent.com/v7ps59thdr-byte/script-/main/myscripy.lua"))()
        </textarea>
        <br>
        <button onclick="copyScript()">📋 نسخ السكربت</button>
    </div>

    <script>
        function copyScript() {
            var copyText = document.getElementById("myScript");
            copyText.select();
            document.execCommand("copy");
            alert("تم النسخ يا بطل!");
        }
    </script>
</body>
</html>

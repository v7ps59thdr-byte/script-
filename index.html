<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع خالد للسكربتات ⚡</title>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        .btn {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1>موقع خالد للسكربتات ⚡</h1>
    <p>أهلاً بك في موقعي الخاص بالسكربتات والأكواد</p>

    <div class="btn-container">
        <button class="btn" onclick="alert('جاري نسخ السكربت الأول!')">سكربت Roblox</button>
        <button class="btn" onclick="alert('جاري نسخ السكربت الثاني!')">سكربت Discord Bot</button>
    </div>

</body>
</html>
